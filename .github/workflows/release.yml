name: Create GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Extract changelog section
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          notes=$(awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md)

          if [[ -z "${notes//[[:space:]]/}" ]]; then
            echo "no CHANGELOG entry for $version, falling back to auto-generated notes" >&2
            echo "body=" >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<__EOF__"
              echo "$notes"
              echo "__EOF__"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          NOTES: ${{ steps.notes.outputs.body }}
        run: |
          set -euo pipefail
          if [[ -n "$NOTES" ]]; then
            gh release create "$TAG" --title "$TAG" --notes "$NOTES"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
